<html lang="en">
<head>

  {
  "@context": "https://schema.org",

  </script>
  <link rel="canonical" href="https://civic-nexus.net/index.html">
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Civic Nexus">
  <meta property="og:title"       content="Civic Nexus — Political Insight & Research">
  <meta property="og:description" content="Free, independent political insight tools — the Civic Cube ideological compass and the Policy Cube political compass. No ads, no agenda.">
  <meta property="og:url"         content="https://civic-nexus.net/index.html">
  <meta property="og:image"       content="https://civic-nexus.net/SRC/og-image.png">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:site"        content="@NexusCivic">
  <meta name="twitter:title"       content="Civic Nexus — Political Insight & Research">

    <link rel="manifest" href="/site.webmanifest">
</head>
<body>
  <div class="splash" id="splash">

    <!-- Curtain panels -->
    <div class="curtain left"></div>
    <div class="curtain right"></div>

    <!-- Ambient light burst at seam -->
    <div class="seam-light"></div>

    <!-- Centre card -->
    <div class="logo-container" id="logoContainer">
      <div class="logo-mark">
        <img src="SRC/civicnexus_black.svg" alt="Civic Nexus Logo" id="splashLogo" />
      </div>
      <h1>Civic Nexus</h1>
      <p class="splash-tagline">Political Insight &amp; Research</p>
    </div>

  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const splash = document.getElementById('splash');

      // Stage 1: card appears (CSS handles fade-in via animation)
      setTimeout(() => {
        // Stage 2: seam light pulses, curtains split
        splash.classList.add('open');

        // Stage 3: redirect once curtains have cleared
        setTimeout(() => {
          window.location.href = "home.html";
        }, 1100);
      }, 1600);
    });
  </script>
</body>
